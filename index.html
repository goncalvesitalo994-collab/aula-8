<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mais Você</title>
    <link rel="stylesheet" href="mais.css">
</head>
<body>
    <div class="caixa">
        <img src="MAIS_VOCE_2009_2.webp" alt="logo + VC" class="logo">
        <img src="maisvoce.jpg" alt="Foto de Programa" class="foto-topo">
        <h1>Café da Manhã do Mais Você</h1>
        <p class="texto">
            Faça um Cadastro e venha tomar café da Manhã com Ana Maria ao vivo.
        </p>
        <div class="historia">
            <h2>Sobre o Programa</h2>
        <p>O Mais Você é um programa de variedade de tv brasileira.
            Marcado por culinaria, entrevistas e conversa leve com o público.
        </p>
        </div>
        <div class="bloco">
            <div class="lado-form">
                <form id="formulario">
                    <input type="text" id="nome" name="nome" placeholder="Nome">
                    <input type="text" id="telefone" name="telefone" placeholder="Telefone">
                    <input type="password" id="senha" name="senha" placeholder="Senha">
                    <input type="password" id="confimar" name="confimar_senha" placeholder="Confimar_senha">
                    
                    <button type="submit"> Cadastro</button>

                    <p id="mensagem"></p>

                </form>
            </div>
            <div class="lado-foto">
                <img src="maisvoce_dois.jpg" alt="Foto" class="foto-lado">
            </div>
        </div>

    </div>

    <script src="script.js"></script>
    
</body>
</html>
